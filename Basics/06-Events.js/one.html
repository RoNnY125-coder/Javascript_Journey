
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>htnml Events </title>
</head>
<body style="background-color: #414141; color: aliceblue;">
    <h2>Amazing image</h2>
    <div >
        <ul id="images">
            <li><img width="200px" id="japan" src="https://images.pexels.com/photos/3532553/pexels-photo-3532553.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt=""></li>
            <li><img width="200px" id="river" src="https://images.pexels.com/photos/3532551/pexels-photo-3532551.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt=""></li>
            <li><img width="200px" id="owl" src="https://images.pexels.com/photos/3532552/pexels-photo-3532552.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt="" ></li>
            <li><img width="200px" id="prayer" src="https://images.pexels.com/photos/2522671/pexels-photo-2522671.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt=""></li>
            <li><a style="color: aliceblue;" href="https://google.com" id="google">Google</a></li>
        </ul>
   </div>
</body>
<script>
    // it is a sequential run language
    // document.getElementById('owl').onclick = function(){
    //     alert("Sheesh an owl!")  // but we cannot use many things , so we should use events which can give us many methods for propagation
    // }

    //the best approach
    document.getElementById('images').addEventListener('click',function(yo){
        console.log('Clicked inside the UL');  // we get events in the console
    },false) //its default value

    //need to study
    //types , timestamp , defaultPrevented 
    //target , toElement, srcElement, currentTarget,
    //clientX , clientY, ScreenX, screenY (positions)
    //altkey , ctrlkey , shiftkey , keycode

    //event propagation
    document.getElementById('owl').addEventListener('click',function(yo){
        console.log('owl clicked');
        yo.stopPropagation()  // we get events in the console
    },false) // we get the owl clicked first

    document.getElementById('google').addEventListener('click',function(yo){
        console.log("google clicked");
        yo.preventDefault();
        yo.stopPropagation();
    },false) 

    document.querySelector('#images').addEventListener('click',function(yo){
        console.log(yo.target);
        let removethis = yo.target
        removethis.remove() //can take many values with target
    },false)

</script>
</html>
