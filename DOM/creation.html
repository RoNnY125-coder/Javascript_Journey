<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intense Coding</title>
</head>
<body style="background-color: black; color: white;">
    
</body>
<script>
    const div=document.createElement('div')   //create new div or any property you want
    console.log(div);
    div.className="main"   //created a class
    div.id= Math.round(Math.random()*10+1)    //created an id

    div.setAttribute("Title","Ultra work")  //dont bring the value , it directly set the attribute
    div.style.backgroundColor="red"
    div.style.padding="10px"

    div.innerText="Ronny's message"  
    
    const textadd=document.createTextNode("RONNY")
    div.appendChild(textadd)

    document.body.appendChild(div) //we can create elements which can be showed in the doc
</script>
</html>
